name: Curate awards
on:
  schedule:
    - cron: "0 4 * * 3"
      timezone: "Asia/Seoul"   # native cron timezone (GitHub Actions, Mar 2026+)
  workflow_dispatch: {}
permissions:
  contents: write
env:
  TZ: "Asia/Seoul"             # job clock = KST, so generated_at is stamped in Seoul time
jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      # This repo: curation code + lib + node deps.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      # The canonical data lives in nambin.github.io, not here. Check it out
      # into ./site (NAMBIN_IO_TOKEN = a write credential for that repo) so the
      # CLI can read its movies.yml and write its awards.yml, then push there.
      - uses: actions/checkout@v4
        with:
          repository: nambin/nambin.github.io
          token: ${{ secrets.NAMBIN_IO_TOKEN }}
          path: site

      - name: Install dependencies
        run: npm ci

      - name: Curate awards
        run: node cli/curate-awards.mjs
        env:
          # Point the CLI at the site checkout's data/ (reads movies.yml,
          # writes awards.yml there).
          DATA_DIR: site/data
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # The CLI writes a human-readable "what's new" summary here when (and
          # only when) awards.yml actually changed.
          AWARDS_SUMMARY_FILE: awards-summary.txt

      - name: Detect changes
        id: changes
        run: |
          if git -C site diff --quiet -- data/awards.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git -C site config user.name  "github-actions[bot]"
          git -C site config user.email "github-actions[bot]@users.noreply.github.com"
          git -C site add data/awards.yml
          git -C site commit -m "chore: refresh award curation"
          git -C site push

      # --- Email: success WITH changes (silent when nothing changed) ----------
      - name: Compose update email
        if: steps.changes.outputs.changed == 'true'
        run: |
          {
            echo 'MAIL_BODY<<__EOF__'
            cat awards-summary.txt
            echo ''
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: Email — updated
        if: steps.changes.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: nambin.heo@gmail.com
          password: ${{ secrets.MAIL_PASSWORD }}
          from: nambin.heo@gmail.com
          to: nambin.heo@gmail.com
          subject: "Movie-manager Award curation updated"
          body: ${{ env.MAIL_BODY }}
        # No failure email — GitHub already emails on a failed workflow run.
